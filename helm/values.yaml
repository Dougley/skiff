image:
  repository: ghcr.io/dougley/skiff
  tag: latest
  pullPolicy: IfNotPresent

# persistent volume for the embedded pglite database
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# sensitive env vars — stored in a Secret
# use existingSecret to reference a pre-created secret instead of putting
# values here (recommended for production / gitops workflows)
# BRAVE_SEARCH_API_KEY powers web_search
# CLOUDFLARE_* powers fetch_url markdown extraction + browser_cdp actions
secret:
  existingSecret: ""
  DISCORD_BOT_TOKEN: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  BRAVE_SEARCH_API_KEY: ""
  CLOUDFLARE_ACCOUNT_ID: ""
  CLOUDFLARE_API_TOKEN: ""
  OLLAMA_API_KEY: ""

# non-sensitive env vars — stored in a ConfigMap
config:
  LOG_LEVEL: info
  NODE_ENV: production
  LLM_DEFAULT_MODEL: gpt-4o-mini
  LLM_DEFAULT_PROVIDER: openai
  EMBEDDING_PROVIDER: openai
  EMBEDDING_MODEL: text-embedding-3-small
  # set to "disabled" to turn off memory extraction
  MEMORY_EXTRACT_MODEL: ""
  CONTEXT_WINDOW_SIZE: "128000"
  RAG_TOP_K: "5"
  RAG_RECENT_LIMIT: "12"
  RAG_MIN_SIMILARITY: "0.3"
  SHELL_ENABLED: "false"
  SHELL_WORK_DIR: /home/skiff
  SHELL_ALLOWED_DIRS: /tmp
  HEARTBEAT_ENABLED: "true"
  HEARTBEAT_INTERVAL_MINUTES: "30"
  HEARTBEAT_QUIET_HOURS_START: "23:00"
  HEARTBEAT_QUIET_HOURS_END: "08:00"
  HEARTBEAT_TIMEZONE: UTC
  HEARTBEAT_ACK_MAX_CHARS: "300"
  ACCESS_POLICY: open
  ACCESS_DM_POLICY: open
  ACCESS_ALLOWED_GUILDS: ""
  ACCESS_ALLOWED_CHANNELS: ""
  ACCESS_ALLOWED_USERS: ""
  TOOL_CHANNEL_RULES: ""
  TOOL_GUILD_RULES: ""
  TOOL_DM_RULES: ""
  TOOL_USER_RULES: ""
  SKILLS_DIR: ./skills
  MCP_CONFIG_PATH: mcp.json
  PERSONA_FILE: ./agent.persona.json
  # Sleep cycle (dream pass) phase tuning
  SLEEP_CONSOLIDATE_LOOKBACK_DAYS: "30"
  SLEEP_CONSOLIDATE_MAX_USERS: "10"
  SLEEP_CONSOLIDATE_MIN_FACTS: "2"
  SLEEP_DEDUPE_SIMILARITY: "0.9"
  SLEEP_MAX_TOPICS: "200"
  SLEEP_MAX_MERGES_PER_RUN: "20"
  SLEEP_CLUSTER_THRESHOLD: "0.85"
  SLEEP_MIN_CLUSTER_SIZE: "5"
  SLEEP_MAX_CLUSTERS_PER_RUN: "3"
  SLEEP_MAX_SAMPLES: "500"
  SLEEP_NEW_TOPIC_OVERLAP_THRESHOLD: "0.85"
  SLEEP_SYNTHESIZE_LOOKBACK_DAYS: "7"
  SLEEP_REFLECT_LOOKBACK_DAYS: "14"
  SLEEP_REFLECT_MAX_MESSAGES: "120"
  SLEEP_REFLECT_MIN_CONFIDENCE: "70"
  SLEEP_REFLECT_MAX_ADDENDA_PER_RUN: "3"
  SLEEP_PROPOSE_LOOKBACK_DAYS: "7"
  SLEEP_PROPOSE_MAX_USER_MESSAGES: "200"
  SLEEP_PROPOSE_MIN_CONFIDENCE: "75"
  SLEEP_MAX_ADDENDA_PER_SCOPE: "15"

# optional ollama sidecar for local embeddings
# when enabled, EMBEDDING_PROVIDER and EMBEDDING_MODEL are overridden to
# point at the local ollama service
ollama:
  enabled: false
  model: nomic-embed-text
  image:
    repository: ollama/ollama
    tag: latest
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce

resources: {}

nameOverride: ""
fullnameOverride: ""

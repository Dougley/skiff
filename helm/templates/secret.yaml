{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "skiff.fullname" . }}
  labels:
    {{- include "skiff.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secret.DISCORD_BOT_TOKEN }}
  DISCORD_BOT_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.OPENAI_API_KEY }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.ANTHROPIC_API_KEY }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.BRAVE_SEARCH_API_KEY }}
  BRAVE_SEARCH_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.OLLAMA_API_KEY }}
  OLLAMA_API_KEY: {{ . | quote }}
  {{- end }}
{{- end }}

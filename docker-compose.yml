services:
  ollama-pull:
    image: ollama/ollama
    restart: "no"
    # volumes:
    #   - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: "-c 'sleep 5; ollama pull nomic-embed-text'" 
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  bot:
    # build: .
    image: ghcr.io/dougley/skiff:latest
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
    volumes:
      - pg_data:/app/pg_data
    depends_on:
      ollama-pull:
        condition: service_completed_successfully

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment to expose Ollama on the host
    # ports:
    #   - "11434:11434"

volumes:
  pg_data:
  ollama_data:
